[global]
   workgroup = WORKGROUP
   server string = curl-smb3-test
   security = user
   map to guest = never
   # Force modern dialects only: SMB 2.02 .. SMB 3.1.1 (no SMBv1).
   server min protocol = SMB2
   server max protocol = SMB3_11
   smb ports = 445
   # Encryption is negotiated when the client asks for it (AES-128/256-GCM
   # on SMB 3.1.1). Flip to "required" on the [share] below to force it.
   smb encrypt = desired
   log level = 1
   disable spoolss = yes
   load printers = no
   printing = bsd
   printcap name = /dev/null

[share]
   path = /srv/share
   comment = curl SMB3 test share
   read only = no
   guest ok = no
   valid users = smbuser
   force user = smbuser
   create mask = 0644
   # Uncomment to require SMB3 encryption (exercises the SMB3 encryption transform):
   # smb encrypt = required
